<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Roommate Matching Platform</title>
</head>
<body>
    <header>
        <h1>Roommate Matching Platform</h1>
        <nav>
            <ul>
                <li><a href="#dashboard">Dashboard</a></li>
                <li><a href="#search">Search Roommates</a></li>
                <li><a href="#matches">My Matches</a></li>
                <li><a href="#messages">Messages</a></li>
                <li><a href="#profile">My Profile</a></li>
            </ul>
        </nav>
    </header>

    <section id="dashboard">
        <h2>Welcome to Your Roommate Matching Platform!</h2>
        <!-- Display key information and notifications -->
    </section>

    <section id="search">
        <h2>Search Roommates</h2>
        <!-- Implement search and filters for roommate matching -->
    </section>

    <section id="matches">
        <h2>My Matches</h2>
        <!-- Display suggested roommates based on the matching algorithm -->
    </section>

    <section id="messages">
        <h2>Messages</h2>
        <!-- Implement messaging system for communication with potential roommates -->
    </section>

    <section id="profile">
        <h2>My Profile</h2>
        <!-- Allow users to update and customize their profiles -->
    </section>

    </footer>
